# Nginx Configuration - Personal Site

# Rate Limiting
# These zones track requests per IP address.
# "10m" = 10MB of shared memory (~160,000 IPs).
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Connection Limits
    limit_conn addr 10;
    limit_req zone=general burst=20 nodelay;

    # Buffer Size Limits (prevent buffer overflow attacks)
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    client_max_body_size 1M;
    large_client_header_buffers 2 1k;

    # Timeouts (prevent slowloris attacks)
    client_body_timeout 10;
    client_header_timeout 10;
    keepalive_timeout 5 5;
    send_timeout 10;

    # Hide Nginx Version
    server_tokens off;

    # Gzip Compression
    # Compresses responses to reduce bandwidth. Most browsers support this.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;
    gzip_disable "msie6";

    # Security Headers
    # These headers protect against common web attacks.
    # Also configured in Traefik for defense-in-depth.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Block Hidden Files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block Backup Files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache Static Assets
    # These files have hashed filenames, so they can be cached forever.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        limit_req zone=static burst=50 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block Common Exploit Paths
    location ~* (wp-admin|wp-login|xmlrpc\.php|wp-config\.php) {
        deny all;
        return 444;
    }

    # Block Unsupported HTTP Methods
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 444;
    }

    # React Router Support
    # Sends all routes to index.html so client-side routing works.
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
